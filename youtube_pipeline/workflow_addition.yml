# ============================================================
# 既存の .github/workflows/ai-news.yml に追記する内容
# （既存の "Generate AI News" ジョブの後に以下のジョブを追加）
# ============================================================
#
# ① 既存ワークフローの末尾に以下の env ブロックを確認・追加してください:
#
#   env:
#     TZ: Asia/Tokyo
#
# ② secrets に以下を追加してください（詳細は SETUP_GUIDE.md 参照）:
#   - FISH_AUDIO_API_KEY
#   - FISH_VOICE_ID      （省略可・デフォルト声IDを使用）
#   - YOUTUBE_CLIENT_ID
#   - YOUTUBE_CLIENT_SECRET
#   - YOUTUBE_REFRESH_TOKEN
#   - YOUTUBE_PLAYLIST_ID （省略可）
# ============================================================

  youtube-upload:
    name: 🎬 YouTube 自動アップロード
    runs-on: ubuntu-latest
    needs: generate-news          # ← 既存のニュース生成ジョブ名に合わせて変更
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # 既存ジョブが生成した news.txt を受け取る
      - name: ニュースファイルをダウンロード
        uses: actions/download-artifact@v4
        with:
          name: ai-news-text        # ← 既存ジョブの upload-artifact name に合わせる
          path: output/

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: youtube_pipeline/requirements.txt

      - name: 日本語フォントと ffmpeg をインストール
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-noto-cjk
          echo "[完了] ffmpeg + 日本語フォント インストール済み"

      - name: Python 依存パッケージをインストール
        run: pip install -r youtube_pipeline/requirements.txt

      - name: 放送日を取得
        id: date
        run: echo "value=$(date '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: ① 音声生成 (Fish Audio TTS)
        env:
          FISH_AUDIO_API_KEY: ${{ secrets.FISH_AUDIO_API_KEY }}
          FISH_VOICE_ID:      ${{ secrets.FISH_VOICE_ID }}
          NEWS_TEXT_PATH:     output/news.txt
          NEWS_AUDIO_PATH:    output/news.mp3
        run: |
          echo "[ステップ1] 音声生成開始"
          python youtube_pipeline/generate_audio.py
          echo "[ステップ1] 完了"

      - name: ② 動画生成 (静止画 + 音声 → MP4)
        env:
          NEWS_DATE:       ${{ steps.date.outputs.value }}
          NEWS_TEXT_PATH:  output/news.txt
          NEWS_AUDIO_PATH: output/news.mp3
          NEWS_VIDEO_PATH: output/news.mp4
          NEWS_THUMB_PATH: output/thumbnail.png
        run: |
          echo "[ステップ2] 動画生成開始"
          python youtube_pipeline/generate_video.py
          echo "[ステップ2] 完了"

      - name: ③ YouTube アップロード
        env:
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PLAYLIST_ID:   ${{ secrets.YOUTUBE_PLAYLIST_ID }}
          NEWS_DATE:             ${{ steps.date.outputs.value }}
          NEWS_TEXT_PATH:        output/news.txt
          NEWS_VIDEO_PATH:       output/news.mp4
          NEWS_THUMB_PATH:       output/thumbnail.png
        run: |
          echo "[ステップ3] YouTube アップロード開始"
          python youtube_pipeline/upload_youtube.py
          echo "[ステップ3] 完了"

      - name: アップロード結果をサマリーに表示
        if: always()
        run: |
          if [ -f output/youtube_video_id.txt ]; then
            VIDEO_ID=$(cat output/youtube_video_id.txt)
            echo "## ✅ YouTube アップロード成功" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "🎬 **動画URL:** https://youtube.com/watch?v=${VIDEO_ID}" >> "$GITHUB_STEP_SUMMARY"
            echo "📅 **配信日:** ${{ steps.date.outputs.value }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ❌ YouTube アップロード未完了" >> "$GITHUB_STEP_SUMMARY"
            echo "ログを確認してください" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 生成ファイルを artifact として保存（デバッグ用）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-pipeline-output
          path: |
            output/news.mp4
            output/thumbnail.png
            output/youtube_video_id.txt
          retention-days: 3
