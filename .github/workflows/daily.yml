name: Daily AI News Update

on:
  schedule:
    - cron: '0 20 * * *'  # 20:00 UTC = 翌 05:00 JST (06:00公開狙い・遅延余裕あり)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: |
          pip install -r requirements.txt
          pip install -r youtube_pipeline/requirements.txt

      - name: 記事取得・要約・HTML生成（リトライ機能付き）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # 記事取得（1回のみ）
          python -m src.fetch

          # 要約（最大3回リトライ：Claude のJSON崩れ対策）
          SUMMARIZE_OK=false
          for i in 1 2 3; do
            echo "[要約] 試行 $i/3"
            if python -m src.summarize; then
              SUMMARIZE_OK=true
              echo "[要約] 試行 $i で成功"
              break
            else
              echo "[要約] 試行 $i 失敗、リトライします..."
              sleep 15
            fi
          done

          if [ "$SUMMARIZE_OK" = false ]; then
            echo "::error::要約が3回連続で失敗しました"
            exit 1
          fi

          # HTML生成
          python -m src.build

      - name: HTMLにキャッシュ無効化メタタグを注入（iPhoneアプリ対策）
        run: |
          python << 'EOF'
          import os, re
          for root, dirs, files in os.walk('docs'):
              for fn in files:
                  if not fn.endswith('.html'):
                      continue
                  path = os.path.join(root, fn)
                  with open(path, encoding='utf-8') as f:
                      html = f.read()
                  if 'Cache-Control' in html:
                      continue
                  meta_tags = '''<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
          <meta http-equiv="Pragma" content="no-cache">
          <meta http-equiv="Expires" content="0">'''
                  if '<head>' in html:
                      html = html.replace('<head>', '<head>\n' + meta_tags, 1)
                  else:
                      html = meta_tags + '\n' + html
                  with open(path, 'w', encoding='utf-8') as f:
                      f.write(html)
                  print(f'[キャッシュ無効化] {path}')
          EOF

      - name: GitHub Pages にデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs

      - name: ニュース本文をテキスト抽出
        run: |
          mkdir -p output
          python << 'EOF'
          from bs4 import BeautifulSoup
          with open('docs/index.html', encoding='utf-8') as f:
              soup = BeautifulSoup(f.read(), 'html.parser')
          for tag in soup(['script', 'style', 'nav', 'footer']):
              tag.decompose()
          text = soup.get_text(separator='\n', strip=True)
          lines = [line for line in text.split('\n') if line.strip()]
          with open('output/news.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(lines))
          print(f'[完了] news.txt 生成: {len(lines)} 行')
          EOF

      - name: 重複チェック（前日と同じニュースなら以降スキップ）
        id: dup_check
        run: |
          python << 'EOF'
          import hashlib, os, sys
          with open('output/news.txt', encoding='utf-8') as f:
              current = f.read()
          current_hash = hashlib.sha256(current.encode('utf-8')).hexdigest()
          print(f'[ハッシュ] 今日: {current_hash[:16]}...')

          os.makedirs('data', exist_ok=True)
          last_hash_path = 'data/last_news_hash.txt'
          if os.path.exists(last_hash_path):
              with open(last_hash_path) as f:
                  last_hash = f.read().strip()
              print(f'[ハッシュ] 前日: {last_hash[:16]}...')
              if current_hash == last_hash:
                  print('[スキップ] ニュース内容が前日と同一のため動画生成・アップロードをスキップします')
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write('skip=true\n')
                  with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
                      f.write('## ⏭️ 配信スキップ\n')
                      f.write('ニュース内容が前日と同一のため、動画生成・アップロードをスキップしました。\n')
                  sys.exit(0)

          # 新しいハッシュを保存
          with open(last_hash_path, 'w') as f:
              f.write(current_hash)
          print('[継続] ニュース内容が更新されています。動画生成に進みます')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('skip=false\n')
          EOF

      - name: ffmpeg と日本語フォントをインストール
        if: steps.dup_check.outputs.skip != 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-noto-cjk

      - name: 放送日を取得
        if: steps.dup_check.outputs.skip != 'true'
        id: date
        run: echo "value=$(TZ=Asia/Tokyo date '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: ① ダイアログ変換 (記号除去 + 2人掛け合い化)
        if: steps.dup_check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_TEXT_PATH: output/news.txt
          DIALOGUE_JSON_PATH: output/dialogue.json
        run: python youtube_pipeline/prepare_dialogue.py

      - name: ② 音声生成 (2人キャスター + 1.2倍速 + BGM)
        if: steps.dup_check.outputs.skip != 'true'
        env:
          FISH_AUDIO_API_KEY: ${{ secrets.FISH_AUDIO_API_KEY }}
          FISH_VOICE_ID_A: ${{ secrets.FISH_VOICE_ID_A }}
          FISH_VOICE_ID_B: ${{ secrets.FISH_VOICE_ID_B }}
          AUDIO_SPEED: "1.2"
          BGM_URL: ${{ secrets.BGM_URL }}
          BGM_VOLUME: "0.10"
          DIALOGUE_JSON_PATH: output/dialogue.json
          NEWS_AUDIO_PATH: output/news.mp3
          TIMING_JSON_PATH: output/timing.json
        run: python youtube_pipeline/generate_audio.py

      - name: ③ 動画生成 (Aoiキャラ + ニューススタジオ風)
        if: steps.dup_check.outputs.skip != 'true'
        env:
          NEWS_DATE: ${{ steps.date.outputs.value }}
          DIALOGUE_JSON_PATH: output/dialogue.json
          TIMING_JSON_PATH: output/timing.json
          NEWS_AUDIO_PATH: output/news.mp3
          NEWS_VIDEO_PATH: output/news.mp4
          NEWS_THUMB_PATH: output/thumbnail.png
          SLIDES_DIR: output/slides
        run: python youtube_pipeline/generate_video.py

      - name: ④ YouTube アップロード
        if: steps.dup_check.outputs.skip != 'true'
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          NEWS_DATE: ${{ steps.date.outputs.value }}
          NEWS_TEXT_PATH: output/news.txt
          NEWS_VIDEO_PATH: output/news.mp4
          NEWS_THUMB_PATH: output/thumbnail.png
        run: python youtube_pipeline/upload_youtube.py

      - name: 結果をサマリー表示
        if: always()
        run: |
          if [ -f output/youtube_video_id.txt ]; then
            VIDEO_ID=$(cat output/youtube_video_id.txt)
            echo "## ✅ YouTube アップロード成功" >> "$GITHUB_STEP_SUMMARY"
            echo "🎬 https://youtube.com/watch?v=${VIDEO_ID}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: アーカイブとハッシュをコミット
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/archive/ data/ || true
          git diff --cached --quiet || git commit -m "Archive $(date -u +%Y-%m-%d)"
          git push || true
